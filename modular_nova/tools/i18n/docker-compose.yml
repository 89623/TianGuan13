# NovaSector 全量汉化：自托管 Tolgee（翻译管理平台）。
#
# 启动：  docker compose -f modular_nova/tools/i18n/docker-compose.yml up -d
# 访问：  http://localhost:8085  （首次登录后创建项目，记下 projectId 填入根目录 tolgee.config.ts）
# 同步：  见 tolgee.config.ts —— `tolgee push` 上传英文源串，`tolgee pull` 取回 zh-Hans。
#
# 运行时无需 Tolgee：游戏/前端读「内置 JSON 目录」（strings/i18n、tgui/.../i18n）。
# Tolgee 只在开发期作管理平台，译者在此机翻预填 + 人工校对。
services:
  tolgee:
    image: tolgee/tolgee:latest
    restart: unless-stopped
    ports:
      - "8085:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/tolgee
      SPRING_DATASOURCE_USERNAME: tolgee
      SPRING_DATASOURCE_PASSWORD: tolgee
      # 首次启动创建的管理员账号；请改成强密码或改用 OAuth。
      TOLGEE_AUTHENTICATION_INITIAL_USERNAME: admin
      TOLGEE_AUTHENTICATION_INITIAL_PASSWORD: change-me-please
      TOLGEE_FILE_STORAGE_FS_DATA_PATH: /data
    volumes:
      - ./tolgee-data:/data
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tolgee
      POSTGRES_USER: tolgee
      POSTGRES_PASSWORD: tolgee
    volumes:
      - ./tolgee-db:/var/lib/postgresql/data
