author: "sernseek"
delete-after: True
changes:
  - rscadd: "新增全量本地化（i18n）基础设施：DM 运行时查表 LANG()/LANGU()、全服语言配置、TGUI 本地化助手，以及简体中文语言支持的脚手架。"
  - code_imp: "新增 tools/i18n（基于 SpacemanDMM 的 Rust 字符串抽取/改写工具）、Codex 机翻流水线与 NixOS 开发 flake；人工校对走自选的在线本地化平台。"
  - code_imp: "界面语言改为全服配置控制，并移除玩家个人界面语言偏好。"
  - code_imp: "TGUI 静态文本接入统一 i18n 目录，并在构建时同步前端翻译目录。"
  - code_imp: "本地化抽取/改写扩展到提示与对话框（alert / input / tgui_alert / tgui_input_*）的消息与标题文本。"
  - code_imp: "TGUI 负载（ui_data/ui_static_data）中的多词文本在全服中文时自动反查译文，接入试剂/法术/研究/说明书等非 atom datum 的动态内容。"
  - code_imp: "字符串列表加载支持本地化副本（strings/<locale>/），可本地化 tips、AI 离子法律、幻觉、垃圾邮件等 flavor 数据文件。"
  - code_imp: "试剂、技能/法术、特质的名称与描述在创建时反查译文，覆盖聊天中按名称引用（如「你尝到了……」）的本地化。"
  - code_imp: "表情（emote）的全部形态消息（默剧/外星/AI/机器人等）接入本地化：抽取进目录并在创建时反查译文。"
  - code_imp: "气体、疾病、材料的名称与描述接入本地化反查，覆盖聊天里的单词类名称。"
  - code_imp: "遗留 browse 网页界面与状态栏条目在全服中文时经兜底层翻译残留英文。"
  - code_imp: "新增 I18N_CHAT_FALLBACK 配置项（默认关）：开启后对聊天中拼接的残留英文做兜底翻译。"
  - code_imp: "兜底翻译字典改为随译文自动构建（仅多词短语，避免误翻），并支持 _fallback.json 人工补充。"
  - code_imp: "strings/ flavor 数据文件（提示、AI 离子法律、垃圾邮件、伤痕描述等）并入统一翻译目录，与界面文本同一套流程翻译，由一个同步脚本刷新。"
  - code_imp: "扩展本地化抽取字段：试剂描述与味道、展示名、wiki 描述、反派目标、脑创伤获得/失去消息等大量玩家可见文本现纳入翻译目录（修复试剂描述此前完全未被抽取的问题）。"
  - code_imp: "职业、怪癖、食物类别、精灵配件（发型/渐变等）、语言、配装物品、物种等界面名称接入前端本地化：这些名称同时作为操作标识符，改为只翻译显示、保留英文标识符，避免本地化后无法选择；并修复了翻译流程会覆盖已有人工译文的问题。"
  - code_imp: "状态栏顶部信息（地图/回合 ID/时间膨胀等）也接入本地化兜底；并新增 _fallback.json 人工补充字典，覆盖大厅、逃逸菜单、状态栏等不被自动抽取的静态文本。"
  - bugfix: "修复全服中文时弹窗按钮（tgui_alert）会崩溃报「non-existent button choice」、以及列表选择（tgui_input_list）无法选中的问题：按钮/选项值保持英文标识符（回传校验通过），显示交由前端本地化。"
  - code_imp: "书本正文与标题（厨师食谱、核弹手册等说明书类）接入本地化：整篇内容抽进翻译目录、创建时反查译文。"
  - code_imp: "examine 里的工具/构造提示词（焊接/拧紧/撬开/扳手等）与物件标签（可重命名/导电/全息/绝缘/重量级等）接入本地化反查。"
  - code_imp: "说话动词（说道/低声说/哔哔响等）、时长文本（改为「1分钟34秒」式中文）、公告标题与提示前缀接入本地化。"
  - code_imp: "修复抽取/改写遗漏「方法调用形式」的可见消息（如 user.visible_message(...)、src.say(...)）的重大覆盖缺口：新增约 6400 条玩家可见战斗/交互消息进入翻译目录并改写本地化。"
  - code_imp: "身体部位名（胸部/头部等）改用专用映射本地化，避免与同名物件（如储物箱 chest）的全局误翻；瞄准、自我检查、嵌入物等部位显示一并接入。"
  - code_imp: "examine 描述与自我检查里的代词（他/她/它、是/有等）接入专用映射本地化；自我体检报告（检查伤势/感觉不适等）纳入翻译目录。"
  - code_imp: "新增边界层「模板逆匹配」引擎：目录中已翻译的插值模板（{0} 句式）在聊天/网页/状态栏/公告等输出边界整句命中——按字面段验证、捕获实参并反查、按中文模板重排填充；运行期拼接的英文句子不再需要逐点改写。"
  - code_imp: "抽取器新增激进 pass：源码任意位置的句子型字面量（含插值与字符串拼接）自动进入翻译目录（约 9,000 条），以句末标点为安全闸门排除标识符；日志/调试/管理员后台文本不抽取。"
  - code_imp: "指令（verb 命令面板名）翻译改为可选构建：仓库源码恢复并保持英文（默认构建=英文指令）；中文命令面板经 build-verbs-zh.sh 在构建期注入、构建后自动还原源码。其余翻译均由服务器配置 I18N_SERVER_LOCALE 控制（默认英文）。"
  - bugfix: "修复职业出生提示里的长句（如「初始仅配备骨干人员……」）被拆成中英混排：盒装多行提示在落地前逐行整串反查译文，不再依赖最短匹配的兜底层蚕食长句。"
  - bugfix: "修复补给请求控制台：物品名（含单词类如望远镜/消音器）与左侧全部分类名接入本地化显示；购物车操作（移除/改量/按名加购）兼容译名回传，不再因显示中文而无法操作。"
  - code_imp: "肢体自检/检视的伤情状态词（无恙/红肿且感觉麻木/严重损毁等）与连接词接入本地化，修复「你的胸部 looks OK」式中英混排。"
  - code_imp: "物件检视的属性标签词（可换皮肤/隔热/防脱除/无菌等）补入翻译，检视末行属性不再残留英文。"
  - bugfix: "修复堆叠物品数量描述里残留的英文复数标记（如「30 cable piece\\s」）：本地化输出统一剥除 BYOND 复数后缀宏。"
  - bugfix: "修复大量「目录已有译文却在界面显示英文」的问题：TGUI 数据里运行期拼接/插值生成的句子（如 Orion 事件描述、研究实验要求）现接入边界模板引擎本地化。"
  - bugfix: "修复中央指挥部状态报告（生成的纸张）整篇正文未翻译：报告内容接入本地化兜底，威胁等级公告整块在拼接前反查。"
  - code_imp: "穿梭机控制台、部门订单冷却时长、复印机表单与部门分类、科研控制台等界面的状态词/标签/表单名接入本地化显示。"
  - code_imp: "补全堆叠物品单数名（线圈/地毯块等约 260 条）等剩余可翻译条目的中文；剩余未译项为代号、专有名词、邪教/口音乱码等本就应保留英文的内容。"
  - bugfix: "修复制造机材料栏蓝空晶体等多词材料的图标丢失（显示「?」）：前端按英文材料名查图标表，改为附带英文 id 供查表，名称仍可本地化显示。"
  - bugfix: "修复骰子设计名被误译为「死亡」（应为「骰子」）。"
  - code_imp: "NtOS 软件商店程序名与分类、科技制造机设计名（含单词类如开箱刀）与设计分类接入本地化显示。"
  - code_imp: "代词缩写（it's/they're/he's/they've 等）接入本地化（修复检视里「it's长45厘米」式残留）；鱼类重量单位「千蛤币」、中央指挥部/纳米传讯各部门通报署名接入本地化。"
