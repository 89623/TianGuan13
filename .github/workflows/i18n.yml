# NovaSector 全量汉化 (i18n) CI。
#
# - PR：检测英文主目录是否与源码同步（有新/变字符串未入目录则告警），并报告待改写的纯字符串数量。
# - 手动/定时：合并上游后重同步（extract + rewrite），并自动开 PR。
name: i18n

on:
  pull_request:
    paths:
      - 'code/**'
      - 'modular_nova/**'
      - 'strings/i18n/**'
      - 'tools/i18n/**'
  workflow_dispatch:
    inputs:
      resync:
        description: '执行重同步并开 PR（合并上游后用）'
        type: boolean
        default: false
  schedule:
    # 每周一 03:00 UTC 重同步一次（追上游）。
    - cron: '0 3 * * 1'

jobs:
  i18n-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        run: rustup toolchain install stable --profile minimal --no-self-update
      - name: Build nova-i18n
        run: cargo build --release --manifest-path tools/i18n/Cargo.toml
      - name: Refresh English catalog
        run: ./tools/i18n/target/release/nova-i18n extract --dme tgstation.dme --out strings/i18n/en
      - name: Detect catalog drift
        run: |
          if ! git diff --quiet -- strings/i18n/en; then
            echo "::warning::英文主目录 strings/i18n/en 与源码不同步：有新增/变化的玩家可见字符串未入目录。请运行 tools/i18n/resync.sh 并提交。"
            git --no-pager diff --stat -- strings/i18n/en
          else
            echo "英文主目录已同步。"
          fi
      # 门禁：目录卫生（占位符 parity / 控制字符）+ 标识符碰撞静态分析（基线增量）。
      # 把 AGENTS.md「排查规律」里反复出现的两类 bug（标识符被反查误翻 → StripMenu 蓝屏/出生点错位/
      # 查表失败；译文多出占位符 → 显示生 {N}）从「玩家踩到才发现」变成编译期挡住。
      # 注意：跑 lint 前用「PR 自己的目录」重新生成基线对照 —— drift 已在上一步报告，这里用 HEAD 的
      # en 目录与提交的基线判定**新增**碰撞。
      - name: i18n lint gate（目录卫生 + 标识符碰撞）
        run: |
          git checkout -- strings/i18n/en  # 丢弃 drift 步骤的临时再生成，用 PR 提交的目录判定
          ./tools/i18n/target/release/nova-i18n lint \
            --dme tgstation.dme \
            --catalog strings/i18n \
            --locale zh-Hans \
            --baseline tools/i18n/identifier-baseline.txt
      - name: 伪 locale 生成 smoke（确保 pseudo 子命令可用，供本地/手动跑测）
        run: ./tools/i18n/target/release/nova-i18n pseudo --catalog strings/i18n --locale qps-ploc
      - name: Report pending rewrites
        run: ./tools/i18n/target/release/nova-i18n rewrite --dme tgstation.dme --dry-run

  i18n-resync:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.resync)
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        run: rustup toolchain install stable --profile minimal --no-self-update
      - name: Resync (extract + rewrite)
        run: bash tools/i18n/resync.sh
      - name: Open PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: i18n/resync
          title: 'i18n: 重同步英文目录并改写新字符串'
          commit-message: 'i18n: resync catalogs + rewrite new player-facing strings'
          body: |
            自动重同步：刷新 `strings/i18n/en` 并把新出现的纯字符串消息改写为 `LANG()`。
            待办：用 Codex 把英文目录的新增项翻译到 `strings/i18n/zh-Hans`（见 tools/i18n/mt/i18n-mt.ts）。
